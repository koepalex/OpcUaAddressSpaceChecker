name: Publish

on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Pack tool
        run: dotnet pack src/OpcUaAddressSpaceChecker/OpcUaAddressSpaceChecker.csproj -c Release -o nupkg

      - name: Push package to NuGet
        run: dotnet nuget push nupkg/*.nupkg --skip-duplicate --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
